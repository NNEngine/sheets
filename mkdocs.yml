      name: GitHub Repository

    - icon: material/code-braces
      link: https://www.lua.org/
      name: Lua Language

    - icon: material/package-variant
      link: https://luarocks.org/
      name: LuaRocks

    - icon: fontawesome/solid/envelope
      link: mailto:shivamsharma22468@gmail.com
