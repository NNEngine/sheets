site_name: sheets
site_description: High-performance CSV library for Lua
site_author: Shivam Sharma
site_url: https://nnengine.github.io/sheets/
repo_url: https://github.com/NNEngine/sheets
repo_name: NNEngine/sheets
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png

  palette:
    # Light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: custom
      accent: red

    # Dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: blue
      accent: red

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - toc.follow

  font:
    text: Roboto
    code: Fira Code

  language: en

# Custom CSS
extra_css:
  - stylesheets/custom.css



markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      use_pygments: true
      linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets
  - toc:
      permalink: true
  - tables
  - abbr
  - footnotes

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  # - User Guide:
  #   - Basic Usage: user-guide/basic-usage.md
  #   - Advanced Features: user-guide/advanced-features.md
  #   - Dialects & Formats: user-guide/dialects.md
  - API Reference:
    - api_ref: api/api.md
    # - Reader: api/reader.md
    # - Writer: api/writer.md
    # - DictReader: api/dictreader.md
    # - DictWriter: api/dictwriter.md
    # - Sniffer: api/sniffer.md
    # - Utilities: api/utilities.md
  - Performance:
    - Benchmarks: performance/benchmarks.md
    # - Profiling: performance/profiling.md
  - Architecture:
    - architecture: architecture/architecture.md
    # - Design_Overview: architecture/design.md
    # - Internal_Structure: architecture/internals.md
  - Community:
    - Contributing: community/contributing.md
    - FAQ: community/faq.md
    - Changelog: community/changelog.md

# ======================= FOOTER ==========================
